name: PTU Placement Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Packages
        run: |
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python monitor.py

      - name: Commit previous.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add previous.json

          git diff --cached --quiet || git commit -m "Update previous.json"

          git push